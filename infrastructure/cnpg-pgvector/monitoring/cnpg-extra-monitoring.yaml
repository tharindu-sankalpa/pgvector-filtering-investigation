# Extra PostgreSQL monitoring queries for CNPG
# These are scraped by the CNPG built-in metrics exporter (port 9187)
# Reference: https://cloudnative-pg.io/documentation/current/monitoring/
#
# Apply: kubectl apply -f infrastructure/cnpg-pgvector/monitoring/cnpg-extra-monitoring.yaml
# Then reference in cluster.yaml: monitoring.customQueriesConfigMap

apiVersion: v1
kind: ConfigMap
metadata:
  name: cnpg-extra-monitoring
  namespace: cnpg-pgvector
data:
  queries: |
    pg_cache_hit_ratio:
      query: |
        SELECT current_database() as datname,
               CASE
                 WHEN (sum(heap_blks_hit)+sum(heap_blks_read)) = 0 THEN 1
                 ELSE sum(heap_blks_hit)::float / NULLIF(sum(heap_blks_hit)+sum(heap_blks_read),0)
               END as ratio
        FROM pg_statio_user_tables;
      target_databases: ["*"]
      metrics:
        - datname:
            usage: "LABEL"
            description: "DB name"
        - ratio:
            usage: "GAUGE"
            description: "Cache hit ratio (0..1)"

    pg_connections_by_state:
      query: |
        SELECT state, count(*) AS count
        FROM pg_stat_activity
        GROUP BY state;
      target_databases: ["postgres"]
      metrics:
        - state:
            usage: "LABEL"
            description: "Connection state"
        - count:
            usage: "GAUGE"
            description: "Connections"

    pg_locks_waiting:
      query: |
        SELECT COUNT(*) AS waiting
        FROM pg_locks l
        WHERE l.granted = false;
      target_databases: ["postgres"]
      metrics:
        - waiting:
            usage: "GAUGE"
            description: "Blocked sessions waiting for locks"

    pg_replication_lag_bytes:
      query: |
        SELECT COALESCE(SUM(CASE
          WHEN pg_is_in_recovery() THEN 0
          ELSE GREATEST(0, pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn))
        END),0)::bigint AS lag_bytes
        FROM pg_stat_replication;
      target_databases: ["postgres"]
      metrics:
        - lag_bytes:
            usage: "GAUGE"
            description: "Primary to standby lag in bytes"

    pg_tx_commits_rollbacks:
      query: |
        SELECT datname, xact_commit, xact_rollback
        FROM pg_stat_database
        WHERE datname NOT IN ('template0','template1');
      target_databases: ["postgres"]
      metrics:
        - datname:
            usage: "LABEL"
            description: "DB name"
        - xact_commit:
            usage: "COUNTER"
            description: "Committed tx (cumulative)"
        - xact_rollback:
            usage: "COUNTER"
            description: "Rolled back tx (cumulative)"

    pg_table_size:
      query: |
        SELECT
          relname AS table_name,
          pg_total_relation_size(c.oid)::bigint AS total_bytes,
          pg_table_size(c.oid)::bigint AS table_bytes,
          pg_indexes_size(c.oid)::bigint AS index_bytes
        FROM pg_class c
        JOIN pg_namespace n ON n.oid = c.relnamespace
        WHERE n.nspname = 'public' AND c.relkind = 'r'
        ORDER BY pg_total_relation_size(c.oid) DESC
        LIMIT 20;
      target_databases: ["*"]
      metrics:
        - table_name:
            usage: "LABEL"
            description: "Table name"
        - total_bytes:
            usage: "GAUGE"
            description: "Total size (table + indexes) in bytes"
        - table_bytes:
            usage: "GAUGE"
            description: "Table heap size in bytes"
        - index_bytes:
            usage: "GAUGE"
            description: "Total index size in bytes"

    pg_seq_scan_vs_idx_scan:
      query: |
        SELECT
          relname AS table_name,
          COALESCE(seq_scan, 0) AS seq_scan,
          COALESCE(idx_scan, 0) AS idx_scan,
          COALESCE(seq_tup_read, 0) AS seq_tup_read,
          COALESCE(idx_tup_fetch, 0) AS idx_tup_fetch
        FROM pg_stat_user_tables
        ORDER BY seq_scan DESC
        LIMIT 20;
      target_databases: ["*"]
      metrics:
        - table_name:
            usage: "LABEL"
            description: "Table name"
        - seq_scan:
            usage: "COUNTER"
            description: "Sequential scans"
        - idx_scan:
            usage: "COUNTER"
            description: "Index scans"
        - seq_tup_read:
            usage: "COUNTER"
            description: "Tuples read by seq scans"
        - idx_tup_fetch:
            usage: "COUNTER"
            description: "Tuples fetched by index scans"
