# Wheel of Time Dataset Configuration
#
# This dataset contains text chunks from the Wheel of Time book series
# with pre-computed Ada-002 embeddings for vector similarity search.
#
# Used for: RAG benchmarks, retrieval quality evaluation

name: wheel_of_time

# Path to the main data file containing vector embeddings
# This file contains the actual text chunks and their embeddings
data_file: ../data/wot_chunks_with_embeddings_100pct.parquet

# Path to the query file for benchmark testing
# Generated by src/scripts/build_query_dataset.py from MongoDB Atlas
query_file: ../data/wot_retrieval_queries.parquet

# Column containing the vector embeddings (1536 dimensions for Ada-002)
embedding_column: embedding

# Column containing the text for full-text/BM25 search
text_column: text

# Columns available for filtered search
# These correspond to metadata fields in the source documents
filter_columns:
  - book_name
  - chapter_title

# Primary key column (null = auto-generated)
id_column: null

# Query file column mappings (if different from defaults)
query_embedding_column: query_embedding
query_text_column: query_text

# Additional metadata
metadata:
  source: MongoDB Atlas fantacy_rag.wot_qna
  embedding_model: text-embedding-ada-002
  embedding_dimensions: 1536
  description: Wheel of Time book series text chunks for RAG evaluation
